<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rack Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="ra-header">
    <div class="ra-title">RACK ANALYZER</div>
    <div class="summary">
        <div class="s-item"><div class="s-dot green"></div><span id="cnt-n">—</span>&nbsp;正常</div>
        <div class="s-item"><div class="s-dot amber"></div><span id="cnt-w">—</span>&nbsp;警告</div>
        <div class="s-item"><div class="s-dot red"  ></div><span id="cnt-f">—</span>&nbsp;故障</div>
        <div class="s-item"><div class="s-dot gray" ></div><span id="cnt-u">—</span>&nbsp;未知</div>
    </div>
    <div class="s-item"><div class="ws-dot" id="ws-dot"></div>&nbsp;RA&nbsp;Backend</div>
    <div class="ra-clock" id="clock">--:--:--</div>
</header>

<div class="filter-bar">
    <span class="filter-label">FILTER</span>
    <button class="filter-btn active" data-filter="ALL"     onclick="applyFilter('ALL')">ALL</button>
    <button class="filter-btn"        data-filter="NORMAL"  onclick="applyFilter('NORMAL')">正常</button>
    <button class="filter-btn"        data-filter="WARNING" onclick="applyFilter('WARNING')">警告</button>
    <button class="filter-btn"        data-filter="FAULT"   onclick="applyFilter('FAULT')">故障</button>
    <button class="filter-btn"        data-filter="UNKNOWN" onclick="applyFilter('UNKNOWN')">未知</button>
</div>

<div class="ra-body">
    <div class="device-list" id="device-list"></div>
</div>

<!-- Camera live-view popup -->
<div class="cam-popup hidden" id="cam-popup">
    <div class="cam-popup-header">
        <span id="popup-title">—</span>
        <button class="popup-close" onclick="closeCamPopup()">✕</button>
    </div>
    <img id="popup-stream" src="" alt="Camera feed">
    <div class="cam-popup-info">
        <span id="popup-ocr">—</span>
        <span id="popup-fps">—</span>
        <span id="popup-ts">—</span>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
