<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rack Monitor Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>RACK MONITOR SIMULATOR</h1>
            <div class="subtitle">Network Switch Rack Visualization &amp; State Monitor</div>
        </header>

        <div class="master-panel">
            <div class="panel-title">Master Control</div>
            <div class="panel-controls">
                <button class="btn btn-green" id="btn-all-on">All Power ON</button>
                <button class="btn btn-red" id="btn-all-off">All Power OFF</button>
                <button class="btn btn-amber" id="btn-reset-all">Reset All</button>
                <button class="btn btn-orange" id="btn-sim-fault">Inject Fault</button>
                <button class="btn btn-blue" id="btn-toggle-status">Toggle Status</button>
            </div>
            <div class="panel-summary" id="global-summary"></div>
        </div>

        <div class="rack-container">
            <div class="rack-frame">
                <div class="rack-header">UNIT-A &nbsp;|&nbsp; 19" Standard Rack &nbsp;|&nbsp; 5U</div>
                <div class="rack-inner">
                    <div class="rack-rail left-rail">
                        <div class="rail-unit" data-u="1">1U</div>
                        <div class="rail-unit" data-u="2">2U</div>
                        <div class="rail-unit" data-u="3">3U</div>
                        <div class="rail-unit" data-u="4">4U</div>
                        <div class="rail-unit" data-u="5">5U</div>
                    </div>
                    <div class="rack-body" id="rack-body"></div>
                    <div class="rack-rail right-rail">
                        <div class="rail-unit" data-u="1">1U</div>
                        <div class="rail-unit" data-u="2">2U</div>
                        <div class="rail-unit" data-u="3">3U</div>
                        <div class="rail-unit" data-u="4">4U</div>
                        <div class="rail-unit" data-u="5">5U</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="simulator.js"></script>
</body>
</html>
